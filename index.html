<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POOP DASH RABBIT MOBILE</title>
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; overflow: hidden; }
        body { width: 100vw; height: 100vh; background-color: #111; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        canvas { background-color: #87CEEB; display: block; width: 100%; height: 100%; object-fit: contain; }
        
        #ui { position: absolute; top: 40px; left: 0; width: 100%; pointer-events: none; z-index: 10; display: flex; justify-content: center; align-items: center; padding: 0 20px; }
        .score-container { display: flex; align-items: center; margin-left: 15px; }
        .score-num { font-size: 50px; color: #ffeb3b; font-weight: bold; text-shadow: 3px 3px 0 #000; }
        #doubleIndicator { font-size: 30px; color: #000; font-weight: bold; margin-left: 10px; display: none; animation: flash 0.5s infinite; }
        
        #barrierIcon {
            width: 70px; height: 70px; background: rgba(0, 150, 255, 0.4); border: 4px solid #00d2ff;
            border-radius: 50%; display: none; justify-content: center; align-items: center;
            position: relative;
        }
        #barrierIcon.active { display: flex; animation: pulse 0.8s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; color: white;
            text-align: center; cursor: pointer;
        }
        .msg-box { width: 85%; max-width: 400px; pointer-events: none; }
        .msg { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .death-msg { font-size: 28px; color: #ff4444; margin-bottom: 20px; font-weight: bold; display: none; }
        .start-btn { font-size: 24px; color: #ffeb3b; margin-top: 20px; animation: flash 1s infinite; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="msg-box">
            <div id="statusMsg" class="msg">🐰 POOP DASH RABBIT 🐰</div>
            <div id="deathText" class="death-msg">死んじゃった( ﾉД`)ｼｸｼｸ…</div>
            <div class="start-btn">TAP TO START</div>
        </div>
    </div>

    <div id="ui">
        <div id="barrierIcon">
            <span style="font-size:32px">🛡️</span>
            <div id="barrierTimer" style="position:absolute;bottom:-25px;color:#00d2ff;font-weight:bold;font-size:18px;text-shadow:1px 1px 0 #000;"></div>
        </div>
        <div class="score-container">
            <div class="score-num" id="scoreBoard">0</div>
            <div id="doubleIndicator">×2</div>
        </div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("scoreBoard");
    const doubleInd = document.getElementById("doubleIndicator");
    const barrierIcon = document.getElementById("barrierIcon");
    const barrierTimerEl = document.getElementById("barrierTimer");
    const overlay = document.getElementById("overlay");
    const statusMsg = document.getElementById("statusMsg");
    const deathText = document.getElementById("deathText");

    let audioCtx;
    let bgmNode = null;

    function initAudio() { 
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    // BGM生成システム
    function startBGM() {
        if (bgmNode) bgmNode.stop();
        bgmNode = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        bgmNode.type = 'triangle';
        
        // シンプルな疾走ベースライン
        const notes = [110, 110, 164, 110, 146, 110, 164, 130]; 
        const now = audioCtx.currentTime;
        let time = now;
        for (let i = 0; i < 200; i++) { // 約1分間のループデータ
            const freq = notes[i % notes.length];
            bgmNode.frequency.setValueAtTime(freq, time);
            time += 0.15;
        }
        
        gain.gain.setValueAtTime(0.05, now);
        bgmNode.connect(gain);
        gain.connect(audioCtx.destination);
        bgmNode.start();
    }

    function stopBGM() {
        if (bgmNode) {
            bgmNode.stop();
            bgmNode = null;
        }
    }

    function playSynth(freq, type, duration, vol=0.1, slide=0) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide !== 0) osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const se = {
        jump: () => playSynth(600, 'square', 0.1, 0.05, -300),
        getBarrier: () => playSynth(800, 'sine', 0.2, 0.1, 400),
        useBarrier: () => playSynth(400, 'sawtooth', 0.5, 0.03, 100),
        getDouble: () => {
            playSynth(1800, 'sine', 0.15, 0.1, 600);
            setTimeout(() => playSynth(2400, 'sine', 0.15, 0.1, 700), 50);
            setTimeout(() => playSynth(3200, 'sine', 0.25, 0.1, 900), 100);
        },
        crash: () => playSynth(100, 'sawtooth', 0.6, 0.2, -50)
    };

    const V_WIDTH = 1000; const V_HEIGHT = 1600; 
    function resize() { canvas.width = V_WIDTH; canvas.height = V_HEIGHT; }
    window.addEventListener('resize', resize); resize();

    let score = 0, gameActive = false, lastTime = performance.now();
    let spawnTimer = 0, barrierSpawnTimer = 0, doubleSpawnTimer = 0, nextSpawnTime = 500;
    const groundY = V_HEIGHT * 0.88;
    let barrierActive = false, barrierTimeLeft = 0;
    let doubleActive = false, doubleTimeLeft = 0;
    const rabbit = { x: V_WIDTH * 0.25, y: groundY - 100, dy: 0, jump: -2450, grav: 11000, grounded: false };
    const obstacles = [], items = [];

    function handleStart(e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        initAudio();
        if (!gameActive) { 
            reset(); 
            overlay.style.display = "none"; 
            gameActive = true; 
            startBGM(); // BGM開始
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }
    }
    overlay.addEventListener("touchstart", handleStart);
    overlay.addEventListener("mousedown", handleStart);

    function reset() {
        score = 0; scoreEl.innerText = 0; obstacles.length = 0; items.length = 0;
        barrierActive = false; doubleActive = false;
        doubleInd.style.display = "none"; barrierIcon.style.display="none";
        deathText.style.display = "none";
        rabbit.dy = 0; rabbit.y = groundY - 65; spawnTimer = 0; 
        barrierSpawnTimer = 0; doubleSpawnTimer = 0;
    }

    const doJump = (e) => {
        if (!gameActive) return;
        if (rabbit.grounded) { rabbit.dy = rabbit.jump; rabbit.grounded = false; se.jump(); }
    };
    window.addEventListener("touchstart", (e) => { if(gameActive) { doJump(e); e.preventDefault(); } }, { passive: false });
    window.addEventListener("mousedown", (e) => { if(gameActive) doJump(e); });

    function update(dt) {
        if (!gameActive) return;
        let scoreGain = dt * 50;
        if (doubleActive) {
            scoreGain *= 2; doubleTimeLeft -= dt;
            if (doubleTimeLeft <= 0) { doubleActive = false; doubleInd.style.display = "none"; }
        }
        score += scoreGain; scoreEl.innerText = Math.floor(score);
        
        if (barrierActive) {
            barrierTimeLeft -= dt;
            barrierTimerEl.innerText = Math.ceil(barrierTimeLeft) + "s";
            if (barrierTimeLeft <= 0) { 
                barrierActive = false; 
                barrierIcon.style.display="none"; 
                barrierIcon.classList.remove("active");
            }
        }

        rabbit.dy += rabbit.grav * dt; rabbit.y += rabbit.dy * dt;
        if (rabbit.y > groundY - 65) { rabbit.y = groundY - 65; rabbit.dy = 0; rabbit.grounded = true; }
        
        spawnTimer += dt * 1000;
        if (spawnTimer > nextSpawnTime) {
            obstacles.push({ x: V_WIDTH + 200, y: groundY, size: Math.random()*20+60 });
            spawnTimer = 0; nextSpawnTime = Math.random()*500+450;
        }
        barrierSpawnTimer += dt * 1000;
        if (barrierSpawnTimer > 7000) { items.push({ type: 'barrier', x: V_WIDTH + 200, y: groundY - 250 - Math.random()*150 }); barrierSpawnTimer = 0; }
        doubleSpawnTimer += dt * 1000;
        if (doubleSpawnTimer > 15000) { items.push({ type: 'double', x: V_WIDTH + 200, y: groundY - 250 - Math.random()*150 }); doubleSpawnTimer = 0; }

        const moveSpeed = (1300 + score * 0.7) * dt;
        items.forEach((it, i) => {
            it.x -= moveSpeed;
            if (Math.hypot(rabbit.x-it.x, rabbit.y-it.y) < 100) {
                if (it.type === 'barrier') { 
                    se.useBarrier();
                    barrierActive = true; 
                    barrierTimeLeft = 6; 
                    barrierIcon.style.display="flex"; 
                    barrierIcon.classList.add("active"); 
                }
                else { se.getDouble(); doubleActive = true; doubleTimeLeft = 3; doubleInd.style.display = "block"; }
                items.splice(i, 1);
            }
        });
        obstacles.forEach((o, i) => {
            o.x -= moveSpeed;
            if (Math.abs(rabbit.x-o.x) < o.size*0.7 && Math.abs((rabbit.y+40)-(o.y-o.size*0.5)) < o.size*0.8) {
                if (barrierActive) { 
                    barrierActive = false; 
                    barrierIcon.style.display="none"; 
                    obstacles.splice(i, 1); 
                    se.getBarrier(); 
                }
                else { 
                    se.crash(); 
                    stopBGM(); // クラッシュ時にBGM停止
                    gameActive = false; 
                    statusMsg.innerText = "GAMEOVER"; 
                    deathText.style.display = "block"; 
                    overlay.style.display="flex"; 
                }
            }
        });
    }

    function draw() {
        ctx.clearRect(0,0,V_WIDTH,V_HEIGHT);
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,V_WIDTH,V_HEIGHT);
        ctx.fillStyle = "#558B2F"; ctx.fillRect(0,groundY,V_WIDTH,V_HEIGHT-groundY);
        items.forEach(it => {
            ctx.save(); ctx.translate(it.x, it.y); ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2);
            const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 45);
            if (it.type === 'barrier') { grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#00d2ff"); ctx.fillStyle = grad; }
            else { grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#ff9800"); ctx.fillStyle = grad; }
            ctx.fill(); ctx.fillStyle = it.type==='barrier'?"white":"#000"; ctx.font = "bold 35px sans-serif"; ctx.textAlign = "center"; ctx.fillText(it.type==='barrier'?"🛡️":"×2", 0, 12);
            ctx.stroke(); ctx.restore();
        });
        obstacles.forEach(o => {
            ctx.save(); ctx.translate(o.x, o.y); ctx.fillStyle = "#795548"; ctx.strokeStyle = "#2D1B15"; ctx.lineWidth = 5;
            [{oy:0,w:o.size,h:o.size*0.45},{oy:-o.size*0.45,w:o.size*0.75,h:o.size*0.35},{oy:-o.size*0.85,w:o.size*0.45,h:o.size*0.3}].forEach(l=>{ ctx.beginPath();ctx.ellipse(0,l.oy,l.w,l.h,0,0,Math.PI*2);ctx.fill();ctx.stroke(); });
            ctx.restore();
        });
        ctx.save(); ctx.translate(rabbit.x, rabbit.y);
        if (barrierActive) { ctx.shadowBlur = 40; ctx.shadowColor = "#00d2ff"; }
        else if (doubleActive) { ctx.shadowBlur = 30; ctx.shadowColor = "#ffeb3b"; }
        [[-0.5,-1.1,-0.1],[0.5,-1.1,0.1]].forEach(p=>{
            ctx.fillStyle="white";ctx.beginPath();ctx.ellipse(p[0]*55,p[1]*55,16,55,p[2],0,Math.PI*2);ctx.fill();ctx.stroke();
            ctx.fillStyle="#FFC0CB";ctx.beginPath();ctx.ellipse(p[0]*55,p[1]*55,8,38,p[2],0,Math.PI*2);ctx.fill();
        });
        ctx.fillStyle="white";ctx.beginPath();ctx.arc(0,0,55,0,Math.PI*2);ctx.fill();ctx.stroke();
        ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(-19,-11,10,19,0,0,Math.PI*2);ctx.ellipse(19,-11,10,19,0,0,Math.PI*2);ctx.fill();
        if (barrierActive) { ctx.beginPath(); ctx.strokeStyle = "#00d2ff"; ctx.lineWidth = 10; ctx.arc(0, 0, 80, 0, Math.PI*2); ctx.stroke(); }
        ctx.restore();
    }

    function loop(t) { 
        if (!gameActive) return;
        let dt = (t - lastTime) / 1000; if (dt > 0.05) dt = 0.05; lastTime = t; 
        update(dt); draw(); requestAnimationFrame(loop); 
    }
</script>
</body>
</html>
