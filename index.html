<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>駆け抜けろうんちラビット</title>
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; overflow: hidden; }
        body { 
            width: 100vw; height: 100vh;
            background-color: #222; display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Black', sans-serif;
        }
        canvas { background-color: #87CEEB; display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
        }
        .title { margin-top: 10px; font-size: 24px; color: #fff; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; }
        .score-num { font-size: 80px; color: #ffeb3b; font-weight: bold; text-shadow: 5px 5px 0 #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="title">駆け抜けろうんちラビット</div>
        <div class="score-num" id="scoreBoard">0</div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("scoreBoard");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let gameActive = true;
    let frame = 0;
    let nextSpawnFrame = 60; 
    const groundY = canvas.height * 0.88;

    const rabbit = {
        x: canvas.width * 0.2,
        y: groundY - 110,
        r: 60, 
        dy: 0, 
        jump: 22, 
        grav: 1.0, 
        grounded: false
    };

    const obstacles = [];

    function handleInput() {
        if (!gameActive) { reset(); return; }
        if (rabbit.grounded) {
            rabbit.dy = -rabbit.jump;
            rabbit.grounded = false;
        }
    }

    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(); }, { passive: false });
    window.addEventListener("keydown", (e) => { if (e.code === "Space") handleInput(); });

    function drawRabbit(x, y, r) {
        ctx.save();
        ctx.translate(x, y);
        if (!rabbit.grounded) ctx.scale(0.95, 1.05);

        ctx.strokeStyle = "#333";
        ctx.lineWidth = 4;

        // 耳
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath(); ctx.ellipse(-r*0.5, -r*1.1, r*0.3, r*1.0, -0.1, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(r*0.5, -r*1.1, r*0.3, r*1.0, 0.1, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#FFC0CB";
        ctx.beginPath(); ctx.ellipse(-r*0.5, -r*1.1, r*0.15, r*0.7, -0.1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(r*0.5, -r*1.1, r*0.15, r*0.7, 0.1, 0, Math.PI*2); ctx.fill();

        // 体
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

        // 目
        ctx.fillStyle = "#000";
        function drawEye(eyeX) {
            ctx.beginPath(); ctx.ellipse(eyeX, -r*0.2, r*0.18, r*0.35, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(eyeX - r*0.06, -r*0.38, r*0.07, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000";
        }
        drawEye(-r*0.35); drawEye(r*0.35);

        // 鼻・口
        ctx.fillStyle = "#FFB6C1";
        ctx.beginPath(); ctx.moveTo(0, r*0.15); ctx.lineTo(-r*0.12, 0); ctx.lineTo(r*0.12, 0); ctx.fill();
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(-r*0.15, r*0.2, r*0.15, 0, Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(r*0.15, r*0.2, r*0.15, 0, Math.PI); ctx.stroke();

        // 足
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.ellipse(-r*0.6, r*0.85, r*0.4, r*0.35, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(r*0.6, r*0.85, r*0.4, r*0.35, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function drawPoop2D(x, y, size) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#6D4C41";
        ctx.strokeStyle = "#2D1B15";
        ctx.lineWidth = 5;
        ctx.lineJoin = "round";

        ctx.beginPath();
        ctx.moveTo(-size, 0);
        ctx.lineTo(size, 0);
        ctx.bezierCurveTo(size*1.3, -size*0.3, size, -size*0.6, size*0.6, -size*0.6);
        ctx.bezierCurveTo(size*0.9, -size*0.9, size*0.6, -size*1.3, 0, -size*1.3);
        ctx.bezierCurveTo(-size*0.4, -size*1.3, -size*0.2, -size*1.7, 0, -size*2.0); 
        ctx.bezierCurveTo(size*0.2, -size*1.7, size*0.4, -size*1.3, 0, -size*1.3);
        ctx.bezierCurveTo(-size*0.6, -size*1.3, -size*0.9, -size*0.9, -size*0.6, -size*0.6);
        ctx.bezierCurveTo(-size, -size*0.6, -size*1.3, -size*0.3, -size, 0);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function reset() {
        score = 0; scoreEl.innerText = score;
        obstacles.length = 0;
        gameActive = true;
        rabbit.dy = 0;
        frame = 0;
        nextSpawnFrame = 60;
        loop();
    }

    function update() {
        if (!gameActive) return;
        rabbit.dy += rabbit.grav;
        rabbit.y += rabbit.dy;

        if (rabbit.y > groundY - 100) {
            rabbit.y = groundY - 100;
            rabbit.dy = 0;
            rabbit.grounded = true;
        }

        if (frame >= nextSpawnFrame) {
            // ★さらに少し小さく調整 (45〜75)
            const poopSize = Math.random() * 30 + 45; 
            obstacles.push({ x: canvas.width + poopSize * 2, y: groundY, size: poopSize });
            nextSpawnFrame = frame + Math.floor(Math.random() * 120) + 60;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= (10 + score * 0.4);
            
            // ★当たり判定をゆるく (見た目より小さく判定)
            const o = obstacles[i];
            const dx = rabbit.x - o.x;
            const dy = (rabbit.y + 40) - (o.y - o.size);
            
            // 判定領域をo.sizeの80%程度に縮小して「ゆるく」
            if (Math.abs(dx) < o.size * 0.7 && Math.abs(dy) < o.size * 0.8) {
                gameActive = false;
            }

            if (obstacles[i].x < -obstacles[i].size * 3) {
                obstacles.splice(i, 1);
                score++;
                scoreEl.innerText = score;
            }
        }
        frame++;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 背景
        let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, "#4facfe"); sky.addColorStop(1, "#00f2fe");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 地面
        ctx.fillStyle = "#689F38";
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = "#8BC34A";
        for(let i=-20; i<canvas.width + 100; i+=100) {
            ctx.beginPath(); ctx.arc(i, groundY, 40, Math.PI, 0); ctx.fill();
        }

        obstacles.forEach(o => drawPoop2D(o.x, o.y, o.size));
        drawRabbit(rabbit.x, rabbit.y, rabbit.r);

        if (!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF5252";
            ctx.textAlign = "center";
            ctx.font = "bold 70px sans-serif";
            ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
            ctx.fillStyle = "white";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("タップしてリトライ", canvas.width/2, canvas.height/2 + 70);
        }
    }

    function loop() {
        update();
        draw();
        if (gameActive) requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
